name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build modules
        run: npm run build -w @rova/modules

      - name: Run tests
        run: npm test

      - name: Build web
        run: npm run build -w @rova/web

  android-elektrikar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Build modules
        run: npm run build -w @rova/modules

      - name: Sync mobile assets
        run: npm run sync:assets -w @rova/mobile-elektrikar

      - name: Capacitor sync Android
        run: npx cap sync android
        working-directory: apps/mobile-elektrikar

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: apps/mobile-elektrikar/android
